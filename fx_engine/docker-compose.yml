version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: fx_engine
      POSTGRES_USER: fx_user
      POSTGRES_PASSWORD: fx_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fx_user -d fx_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://fx_user:fx_pass@db:5435/fx_engine
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: